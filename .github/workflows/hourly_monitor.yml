name: AI Bubble Hourly Monitor

on:
  schedule:
    # 透過 Cron 設定每小時的第 0 分鐘自動執行一次
    - cron: '0 * * * *'
  # 允許在網頁上手動點擊執行
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
    - name: 複製儲存庫程式碼
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝量化必備套件
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas pandas-datareader

    - name: 執行 AI 泡沫監控模型
      run: python ai_bubble_monitor.py
